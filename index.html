      },[rows]);
      return <div ref={wrapperRef} className={`rounded-xl bg-slate-900/70 border border-slate-700 p-4 card-glow h-full`}><div className="map-header flex items-center justify-between gap-2 mb-3"><div><h3 className="font-bold text-cyan-100">Mapa de calor dos locais do fato</h3><p className="text-xs text-slate-400">Cada pingo marca um REDS/local do fato. Use tela cheia para apresentar, ligar/desligar camadas e ajustar coordenadas.</p></div><div className="flex flex-wrap gap-2 justify-end"><button className="text-xs px-2 py-1 rounded border border-cyan-700 text-cyan-200 hover:bg-cyan-950" onClick={()=>setFull(v=>!v)}>{full?'✕ Fechar':'⛶ Tela cheia'}</button><button className="text-xs px-2 py-1 rounded border border-cyan-700 text-cyan-200 hover:bg-cyan-950" onClick={centralizarMapa}>⌖ Centralizar</button><button className="text-xs px-2 py-1 rounded border border-cyan-700 text-cyan-200 hover:bg-cyan-950" onClick={exportMapPng}>📷 PNG</button><button className="text-xs px-2 py-1 rounded border border-cyan-700 text-cyan-200 hover:bg-cyan-950" onClick={()=>setSelected('Todos')}>limpar seleção</button><button className={`text-xs px-2 py-1 rounded border ${editMode?'border-amber-400 text-amber-200 bg-amber-950/40':'border-slate-600 text-slate-200 hover:bg-slate-800'}`} onClick={()=>setEditMode(v=>!v)}>{editMode?'salvar/encerrar ajuste':'ajustar pingos'}</button><button disabled={geoBusy} className="text-xs px-2 py-1 rounded border border-emerald-700 text-emerald-200 hover:bg-emerald-950 disabled:opacity-50" onClick={geocodeVisible}>{geoBusy?'geocodificando...':'geocodificar endereços'}</button></div></div><div className="mb-2 flex flex-wrap gap-2 text-xs"><label className="px-2 py-1 rounded border border-slate-700 bg-slate-950/60"><input type="checkbox" checked={showHeat} onChange={e=>setShowHeat(e.target.checked)} className="mr-1"/>🔥 Heatmap</label><label className="px-2 py-1 rounded border border-slate-700 bg-slate-950/60"><input type="checkbox" checked={showPins} onChange={e=>setShowPins(e.target.checked)} className="mr-1"/>📍 Pingos</label><label className="px-2 py-1 rounded border border-red-800 bg-slate-950/60"><input type="checkbox" checked={showAud} onChange={e=>setShowAud(e.target.checked)} className="mr-1"/>Auditoria</label><label className="px-2 py-1 rounded border border-amber-700 bg-slate-950/60"><input type="checkbox" checked={showNao} onChange={e=>setShowNao(e.target.checked)} className="mr-1"/>Não localizados</label><label className="px-2 py-1 rounded border border-emerald-700 bg-slate-950/60"><input type="checkbox" checked={showRec} onChange={e=>setShowRec(e.target.checked)} className="mr-1"/>Recuperados</label></div><div ref={ref} className={`h-[420px] rounded-lg overflow-hidden border border-slate-700`}></div><div className="mt-2 flex flex-wrap gap-3 text-xs text-slate-300"><span><b style={{color:'#ff3b3b'}}>●</b> Auditoria</span><span><b style={{color:'#ff9f1c'}}>●</b> Não localizado</span><span><b style={{color:'#45e06f'}}>●</b> Recuperado</span>{hot && <span className="text-amber-200">🔥 Maior repetição: <b>{hot.endereco}</b> ({hot.count})</span>}</div>{geoMsg && <p className="mt-1 text-[11px] text-emerald-300">{geoMsg}</p>}<div className="mt-2 flex gap-2"><button className="text-xs px-2 py-1 rounded border border-slate-600 text-slate-300 hover:bg-slate-800" onClick={exportCoords}>Exportar coordenadas atuais</button><button className="text-xs px-2 py-1 rounded border border-red-800 text-red-200 hover:bg-red-950" onClick={()=>{ if(confirm('Limpar todas as coordenadas ajustadas/geocodificadas?')) saveOverrides({}); }}>Limpar ajustes do mapa</button></div><p className="mt-1 text-[11px] text-slate-500">Precisão: LATITUDE/LONGITUDE da planilha &gt; ajuste manual/geocodificação &gt; cadastro aproximado por endereço. Pingos repetidos são abertos em círculo para não ficarem sobrepostos. Os ajustes ficam salvos neste navegador.</p>{full && <div className="fullscreen-overlay"><div className="flex items-center justify-between gap-3 mb-3"><div><h2 className="text-xl font-black text-cyan-100">Mapa de calor dos locais do fato</h2><p className="text-xs text-slate-400">Tela cheia independente para apresentação operacional.</p></div><div className="flex gap-2"><button className="text-xs px-3 py-2 rounded border border-cyan-700 text-cyan-200 hover:bg-cyan-950" onClick={centralizarMapa}>⌖ Centralizar</button><button className="text-xs px-3 py-2 rounded border border-red-700 text-red-200 hover:bg-red-950" onClick={()=>setFull(false)}>✕ Fechar</button></div></div><div className="mb-2 flex flex-wrap gap-2 text-xs"><label className="px-2 py-1 rounded border border-slate-700 bg-slate-950/60"><input type="checkbox" checked={showHeat} onChange={e=>setShowHeat(e.target.checked)} className="mr-1"/>🔥 Heatmap</label><label className="px-2 py-1 rounded border border-slate-700 bg-slate-950/60"><input type="checkbox" checked={showPins} onChange={e=>setShowPins(e.target.checked)} className="mr-1"/>📍 Pingos</label><label className="px-2 py-1 rounded border border-red-800 bg-slate-950/60"><input type="checkbox" checked={showAud} onChange={e=>setShowAud(e.target.checked)} className="mr-1"/>Auditoria</label><label className="px-2 py-1 rounded border border-amber-700 bg-slate-950/60"><input type="checkbox" checked={showNao} onChange={e=>setShowNao(e.target.checked)} className="mr-1"/>Não localizados</label><label className="px-2 py-1 rounded border border-emerald-700 bg-slate-950/60"><input type="checkbox" checked={showRec} onChange={e=>setShowRec(e.target.checked)} className="mr-1"/>Recuperados</label></div><div ref={fullRef} className="fullscreen-map-canvas rounded-lg overflow-hidden border border-slate-700"></div></div>}</div>
    }
    function Table({rows}) {
      const auditRows = rows.filter(r=>isSim(r.CABE_AUDITORIA));
      return <div className="rounded-xl bg-slate-900/70 border border-slate-700 p-4 card-glow h-full"><div className="flex items-center justify-between mb-3"><h3 className="font-bold text-cyan-100">REDS passíveis de auditoria</h3><span className="text-sm text-amber-300">{auditRows.length} registros</span></div><div className="overflow-auto max-h-[410px] scrollbar"><table className="w-full text-sm"><thead className="sticky top-0 bg-slate-900"><tr className="text-cyan-200"><th className="text-left p-2">REDS</th><th className="text-left p-2">Data</th><th className="text-left p-2">Setor</th><th className="text-left p-2">Tipo</th><th className="text-left p-2">Motivo</th></tr></thead><tbody>{auditRows.map((r,i)=><tr key={i} className="border-t border-slate-800 hover:bg-slate-800/80"><td className="p-2 whitespace-nowrap">{r.REDS}</td><td className="p-2 whitespace-nowrap">{r.DATA || String(r.DATA_HORA||'').slice(0,10)}</td><td className="p-2">{r.SETOR}</td><td className="p-2">{r.TIPO_VEICULO}</td><td className="p-2 max-w-[380px] truncate" title={r.MOTIVO}>{r.MOTIVO}</td></tr>)}</tbody></table></div></div>
    }

    function normalizeImportedRows(rawRows){
      const novosDados = (rawRows||[]).map(r=>{
        const out={...r};
        if(out['SETOR ']) out.SETOR=out['SETOR '];
        if(out['Setor']) out.SETOR=out['Setor'];
        if(out['TIPO DE VEÍCULO ']) out.TIPO_VEICULO=out['TIPO DE VEÍCULO '];
        if(out['TIPO DE VEÍCULO']) out.TIPO_VEICULO=out['TIPO DE VEÍCULO'];
        if(out['TIPO_VEÍCULO']) out.TIPO_VEICULO=out['TIPO_VEÍCULO'];
        if(out['NUMERO REDS']) out.REDS=out['NUMERO REDS'];
        if(out['NÚMERO REDS']) out.REDS=out['NÚMERO REDS'];
        if(out['CABE AUDITORIA']) out.CABE_AUDITORIA=out['CABE AUDITORIA'];
        if(out['CABE_AUDITORIA ']) out.CABE_AUDITORIA=out['CABE_AUDITORIA '];
        if(out['ENDEREÇO DO FURTO']) out.ENDERECO_FURTO=out['ENDEREÇO DO FURTO'];
        if(out['ENDERECO DO FURTO']) out.ENDERECO_FURTO=out['ENDERECO DO FURTO'];
        if(out['ENDEREÇO_FURTO']) out.ENDERECO_FURTO=out['ENDEREÇO_FURTO'];
        if(out['DATA/HORA']) out.DATA_HORA=out['DATA/HORA'];
        if(out['DATA HORA']) out.DATA_HORA=out['DATA HORA'];
        if(out['LATITUDE']) out.LATITUDE=out['LATITUDE'];
        if(out['LONGITUDE']) out.LONGITUDE=out['LONGITUDE'];
        return out;
      }).filter(r=>String(r.REDS||'').trim());
      const porReds = new Map();
      novosDados.forEach(r => porReds.set(String(r.REDS).trim(), r));
      return {base:Array.from(porReds.values()), duplicados: novosDados.length - porReds.size, lidos: novosDados.length};
    }

    function Filters({data, rows, filters, setFilters, onCsv, onGoogleSheet, loadingSheet, sheetStatus}) {
      const opts = (field) => ['Todos', ...Array.from(new Set(data.map(r=>field(r)).filter(Boolean))).sort()];
      const Select=({label, val, set, items})=><label className="block"><span className="text-xs uppercase text-slate-400">{label}</span><select value={val} onChange={e=>set(e.target.value)} className="mt-1 w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-sm">{items.map(x=><option key={x}>{x}</option>)}</select></label>;
      return <aside className="rounded-xl bg-slate-900/70 border border-slate-700 p-4 card-glow space-y-4 h-full"><h3 className="font-black text-cyan-100">Filtros</h3><Select label="Mês" val={filters.mes} set={v=>setFilters(f=>({...f,mes:v}))} items={opts(r=>r.MES_LABEL || r.MÊS || r.MES)} /><Select label="Setor" val={filters.setor} set={v=>setFilters(f=>({...f,setor:v}))} items={['Todos','PRAÇA SETE','RODOVIÁRIA','MERCADO CENTRAL']} /><Select label="Tipo de veículo" val={filters.tipo} set={v=>setFilters(f=>({...f,tipo:v}))} items={opts(r=>norm(r.TIPO_VEICULO))} /><Select label="Localizado" val={filters.localizado} set={v=>setFilters(f=>({...f,localizado:v}))} items={['Todos','SIM','NÃO']} /><Select label="Auditoria" val={filters.auditoria} set={v=>setFilters(f=>({...f,auditoria:v}))} items={['Todos','SIM','NÃO']} /><button onClick={()=>setFilters({setor:'Todos',tipo:'Todos',localizado:'Todos',auditoria:'Todos',mes:'Todos'})} className="w-full border border-cyan-700 text-cyan-200 rounded-lg p-2 hover:bg-cyan-950">Limpar filtros</button><div className="border-t border-slate-700 pt-4 space-y-3"><div><label className="text-xs uppercase text-slate-400">Google Planilhas</label><button onClick={onGoogleSheet} disabled={loadingSheet} className="mt-2 w-full bg-emerald-600 hover:bg-emerald-500 disabled:opacity-50 text-white font-bold rounded-lg p-2 text-sm">{loadingSheet?'Carregando...':'Atualizar direto da planilha'}</button><p className="text-xs text-slate-500 mt-2">Lê a planilha Google, substitui a base atual e remove duplicidades pelo REDS.</p>{sheetStatus && <p className="text-xs text-emerald-300 mt-1">{sheetStatus}</p>}</div><div className="pt-3 border-t border-slate-800"><label className="text-xs uppercase text-slate-400">Atualizar CSV manual</label><input type="file" accept=".csv" onChange={onCsv} className="mt-2 block w-full text-xs"/></div></div><ExportButtons rows={rows} /></aside>
    }
    function App() {
      const [data,setData] = useState(()=>{
        try {
          const saved = localStorage.getItem(DATA_STORAGE_KEY);
          if(saved){
            const parsed = JSON.parse(saved);
            if(Array.isArray(parsed) && parsed.length) return parsed;
          }
        } catch(e) {}
        return window.INITIAL_DATA || [];
      });
      const [loadingSheet,setLoadingSheet] = useState(false);
      const [sheetStatus,setSheetStatus] = useState(()=>localStorage.getItem(LAST_LOAD_STORAGE_KEY) || '');
      const [coordOverrides,setCoordOverrides] = useState(()=>{ try { return JSON.parse(localStorage.getItem(COORD_STORAGE_KEY)||'{}'); } catch(e){ return {}; } });
      useEffect(()=>{ window.COORD_OVERRIDES = coordOverrides || {}; }, [coordOverrides]);
      const [filters,setFilters] = useState({setor:'Todos',tipo:'Todos',localizado:'Todos',auditoria:'Todos',mes:'Todos'});
      const rows = useFiltered(data, filters); const m = metrics(rows); const bySector=metricsBySector(rows);
      const furtoSetor = bySector.map(s=>({name:s.setor,value:s.total})).sort((a,b)=>b.value-a.value);
      const audSetor = bySector.map(s=>({name:s.setor,value:s.aud})).sort((a,b)=>b.value-a.value);
      const dias = DIA_ORDER.map(d=>({name:d,value:rows.filter(r=>r.DIA_SEMANA===d).length}));
      const substituirBase = (rawRows, origem='CSV')=>{
        const {base, duplicados, lidos} = normalizeImportedRows(rawRows);
        setData(base);
        try {
          localStorage.setItem(DATA_STORAGE_KEY, JSON.stringify(base));
        } catch(e) {
          console.warn('Não foi possível salvar a base no navegador.', e);
        }
        setFilters({setor:'Todos',tipo:'Todos',localizado:'Todos',auditoria:'Todos',mes:'Todos'});
        const status = `${origem}: ${base.length} registros carregados. Duplicidades removidas: ${duplicados}. Última carga: ${new Date().toLocaleString('pt-BR')}.`;
        setSheetStatus(status);
        try { localStorage.setItem(LAST_LOAD_STORAGE_KEY, status); } catch(e) {}
        return {base, duplicados, lidos};
      };
      const gvizTableToRows=(table)=>{
        const headers=(table.cols||[]).map((c,i)=> (c.label || c.id || `COLUNA_${i+1}`).trim());
        return (table.rows||[]).map(row=>{
          const obj={};
          headers.forEach((h,i)=>{
            const cell=row.c && row.c[i];
            obj[h] = cell ? (cell.f ?? cell.v ?? '') : '';
          });
          return obj;
        }).filter(r=>Object.values(r).some(v=>String(v||'').trim()));
      };
      const carregarGoogleSheet=(silent=false)=>{
        setLoadingSheet(true);
        setSheetStatus('Conectando ao Google Planilhas via JSONP...');

        // JSONP evita o bloqueio de CORS quando o dashboard é aberto como arquivo local (file:///).
        const callbackName = 'googleSheetCallback_' + Date.now();
        const script = document.createElement('script');
        const timeout = setTimeout(()=>{
          cleanup();
          setLoadingSheet(false);
          setSheetStatus('Falha ao acessar via JSONP. Use o botão CSV manual ou abra pelo Live Server.');
          if(!silent) alert('Não consegui carregar automaticamente. Como alternativa, baixe o CSV da planilha publicada e importe pelo botão CSV manual.');
        }, 20000);
        const cleanup=()=>{
          clearTimeout(timeout);
          try{ delete window[callbackName]; }catch(e){ window[callbackName]=undefined; }
          if(script && script.parentNode) script.parentNode.removeChild(script);
        };
        window[callbackName]=(json)=>{
          try{
            const rowsFromSheet = gvizTableToRows(json.table || {});
            const r = substituirBase(rowsFromSheet, 'Google Planilhas');
            setSheetStatus(`Google Planilhas: ${r.base.length} registros carregados. Duplicidades removidas: ${r.duplicados}.`);
            if(!silent) alert(`Planilha Google carregada com sucesso. Registros: ${r.base.length}. Duplicidades removidas: ${r.duplicados}.`);
          }catch(err){
            console.error(err);
            setSheetStatus('Erro ao tratar os dados retornados pela planilha. Verifique o nome das colunas.');
            if(!silent) alert('A planilha foi acessada, mas não consegui tratar os dados. Verifique se a aba publicada contém cabeçalhos na primeira linha.');
          }finally{
            cleanup();
            setLoadingSheet(false);
          }
        };
        script.onerror=()=>{
          cleanup();
          setLoadingSheet(false);
          setSheetStatus('Falha ao conectar na planilha Google.');
          if(!silent) alert('Não consegui conectar na planilha Google. Confirme se ela está publicada na web como CSV e se a internet está ativa.');
        };
        script.src = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/gviz/tq?gid=${GOOGLE_SHEET_GID}&tqx=out:json;responseHandler:${callbackName}`;
        document.body.appendChild(script);
      };

      // Ao abrir ou apertar F5, tenta atualizar automaticamente pelo Google Planilhas.
      // Se a internet falhar, mantém a última base salva no navegador.
      useEffect(()=>{
        carregarGoogleSheet(true);
      }, []);

      const handleCsv=(e)=>{
        const file=e.target.files[0];
        if(!file)return;
        Papa.parse(file, {
          header:true,
          skipEmptyLines:true,
          complete:(res)=>{
            const r = substituirBase(res.data, 'CSV');
            alert(`Base substituída com sucesso. Registros importados: ${r.base.length}. Duplicidades removidas: ${r.duplicados}.`);
            e.target.value = '';
          }
        });
      };
      return <main className="min-h-screen p-5 grid-bg"><header className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-5"><div><div className="text-xs tracking-[.35em] text-cyan-300 uppercase">6ª CIA PM • Praça Sete • Rodoviária • Mercado Central</div><h1 className="text-3xl lg:text-4xl font-black">AUDITORIA OPERACIONAL – FURTO DE VEÍCULOS</h1><p className="text-slate-400">Dashboard Web interativo • Google Planilhas • Sem servidor</p></div><div className="text-right text-sm text-slate-300"><b>Base atual:</b> {data.length} registros<br/><b>Fonte:</b> Google Planilhas / CSV<br/><b>Status:</b> {sheetStatus || 'Base local / inicial'}</div></header><section className="grid grid-cols-1 md:grid-cols-5 gap-3 mb-4"><KPI title="Total de furtos" value={moneyless(m.total)} icon="🚗" color="#55c7ff" /><KPI title="Recuperados" value={moneyless(m.rec)} icon="✅" color="#7ee36a" onClick={()=>setFilters(f=>({...f,localizado:'SIM'}))}/><KPI title="Não recuperados" value={moneyless(m.nao)} icon="❌" color="#ff5f64" onClick={()=>setFilters(f=>({...f,localizado:'NÃO'}))}/><KPI title="Passíveis de auditoria" value={moneyless(m.aud)} icon="🔎" color="#ffd05a" onClick={()=>setFilters(f=>({...f,auditoria:'SIM'}))}/><KPI title="Taxa de recuperação" value={pct(m.rec,m.total)} icon="📈" color="#58f0ff" /></section><section className="grid grid-cols-1 xl:grid-cols-12 gap-4"><div className="xl:col-span-2"><Filters data={data} rows={rows} filters={filters} setFilters={setFilters} onCsv={handleCsv} onGoogleSheet={carregarGoogleSheet} loadingSheet={loadingSheet} sheetStatus={sheetStatus} /></div><div className="xl:col-span-5"><SectorMap rows={rows} selected={filters.setor} setSelected={v=>setFilters(f=>({...f,setor:v}))} coordOverrides={coordOverrides} setCoordOverrides={setCoordOverrides} /></div><div className="xl:col-span-5"><Table rows={rows} /></div><div className="xl:col-span-4"><BarChart title="Furtos por setor" data={furtoSetor} onClick={v=>setFilters(f=>({...f,setor:v}))} selected={filters.setor}/></div><div className="xl:col-span-4"><BarChart title="Auditorias por setor" data={audSetor} color="#ff5f64" onClick={v=>setFilters(f=>({...f,setor:v}))} selected={filters.setor}/></div><div className="xl:col-span-4"><BarChart title="Furtos por dia da semana" data={dias} color="#27a2ff" /></div><div className="xl:col-span-6"><LineChart rows={rows} /></div><div className="xl:col-span-6 rounded-xl bg-slate-900/70 border border-slate-700 p-4 card-glow"><h3 className="font-bold text-cyan-100 mb-3">Indicadores por setor</h3><table className="w-full text-sm"><thead><tr className="text-cyan-200 border-b border-slate-700"><th className="text-left p-2">Setor</th><th className="p-2">Furtos</th><th className="p-2">Rec.</th><th className="p-2">Não rec.</th><th className="p-2">Aud.</th><th className="p-2">Tx.</th><th className="p-2">IVSO</th></tr></thead><tbody>{bySector.map(s=><tr key={s.setor} className="border-b border-slate-800"><td className="p-2" style={{color:SECTOR_COLORS[s.setor]}}>● {s.setor}</td><td className="text-center p-2">{s.total}</td><td className="text-center p-2">{s.rec}</td><td className="text-center p-2">{s.nao}</td><td className="text-center p-2">{s.aud}</td><td className="text-center p-2">{pct(s.rec,s.total)}</td><td className="text-center p-2 font-black text-amber-300">{s.ivso}</td></tr>)}</tbody></table><p className="text-xs text-slate-500 mt-3">IVSO = (Furtos × 2) + (Auditorias × 3) + (Não recuperados × 4) - Recuperados.</p></div></section></main>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
